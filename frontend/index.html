<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%B2%3C/text%3E%3C/svg%3E" />
    <title>Bay Wheels Trip Visualizer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <style>
      .station-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .station-modal-card {
        background: #fff;
        width: 100%;
        height: auto;
        max-height: 60vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        position: relative;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.15);
        align-self: flex-end;
        margin-bottom: 52px;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      @media (min-width: 768px) {
        .station-modal-card {
          width: 500px;
          max-height: 85vh;
          border-radius: 16px;
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
          align-self: center;
          margin-bottom: 0;
        }
      }
    </style>
  </head>
  <body class="m-0 p-0 bg-gray-100 text-gray-900 overflow-hidden font-sans">
    <div id="root" class="w-screen h-dvh"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
