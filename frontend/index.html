<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bay Wheels Trip Visualizer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <style>
      .station-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .station-modal-card {
        background: #fff;
        width: 100%;
        height: auto;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.15);
        align-self: flex-end;
      }
      @media (min-width: 768px) {
        .station-modal-card {
          width: 500px;
          max-height: 85vh;
          border-radius: 16px;
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
          align-self: center;
        }
      }
    </style>
  </head>
  <body class="m-0 p-0 bg-gray-100 text-gray-900 overflow-hidden font-sans">
    <div id="root" class="w-screen h-screen"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
