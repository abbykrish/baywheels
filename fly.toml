app = "baywheels"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "baywheels_data"
  destination = "/data"

[env]
  PORT = "8080"
  BAYWHEELS_DB = "/data/baywheels.duckdb"
